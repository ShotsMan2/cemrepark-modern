version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./dev.db
      - NEXTAUTH_SECRET=super-secret-enterprise-key
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    volumes:
      - ./prisma/dev.db:/app/prisma/dev.db
    restart: always
    networks:
      - saas-network

  # Future-proofing: Redis cache for Distributed Caching & Rate Limiting
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - saas-network

networks:
  saas-network:
    driver: bridge
